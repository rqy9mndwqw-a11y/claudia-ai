name = "claudia-telegram-bot"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "claudia-marketplace"
database_id = "5454cf38-3b0d-4966-b861-91ca85674de2"

[vars]
MAIN_APP_URL = "https://app.claudia.wtf"

[triggers]
crons = [
  "0 14 * * 1",
  "0 14 1 * *",
  "0 20 * * *",
  "45 8 * * *",
  "0 9 * * *",
]
